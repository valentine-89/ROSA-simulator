<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample IoT Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard-themes.css" />
  <script>
    (function () {
      try {
        var savedTheme = window.localStorage.getItem("sample-dashboard-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {
        // Ignore localStorage access issues and fall back to the default theme.
      }
    })();
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        background: var(--theme-bg);
        color: var(--theme-text);
        transition: all 0.3s ease;
        min-height: 100vh;
        font-family: "Segoe UI Variable Text", "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
        @apply p-2 md:p-6;
      }
      
      .panel, .section-card, .light-card, .sensor-stat, .data-surface, .data-kpi-card, .media-shell, .widget-card {
        background: var(--theme-card) !important;
        border: var(--theme-border) !important;
        box-shadow: var(--theme-shadow) !important;
        border-radius: var(--theme-radius) !important;
        @apply p-5 transition-all duration-300;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      
      .btn, .toolbar-button, .program-action-button {
        background: var(--theme-btn-bg) !important;
        color: var(--theme-btn-text) !important;
        border: var(--theme-border) !important;
        box-shadow: var(--theme-shadow) !important;
        border-radius: var(--theme-radius) !important;
        @apply px-4 py-3 font-bold cursor-pointer transition-all duration-150 flex items-center justify-center;
      }
      
      .btn:active, .toolbar-button:active, .program-action-button:active {
        transform: translate(2px, 2px);
        box-shadow: none !important;
      }
      
      .input, .textarea, .select {
        background: var(--theme-card);
        color: var(--theme-text);
        border: var(--theme-border);
        border-radius: var(--theme-radius);
        @apply w-full px-4 py-3 outline-none;
      }
      
      /* Specific utility maps using config and variables */
      .shell { @apply max-w-7xl mx-auto flex flex-col gap-6 w-full; }
      #app-shell {
        @apply flex flex-col gap-6;
      }
      #app-shell > [data-layout-key] {
        min-width: 0;
      }
      #app-shell > [data-layout-key="controlView"] {
        position: sticky;
        top: 0.75rem;
        z-index: 20;
        max-height: min(35vh, calc(100vh - 1.5rem));
        overflow: auto;
      }
      @media (min-width: 1280px) {
        #app-shell {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          align-items: start;
          gap: 1.5rem;
        }
        #app-shell > [data-layout-key="controlView"] {
          top: 1rem;
          max-height: min(35vh, calc(100vh - 2rem));
        }
        #app-shell > [data-layout-key="controlView"],
        #app-shell > [data-layout-key="businessReports"] {
          grid-column: 1 / -1;
        }
      }
      @media (min-width: 1800px) {
        #app-shell {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      .grid-two { @apply grid grid-cols-1 xl:grid-cols-2 gap-6; }
      h1 { @apply text-4xl md:text-5xl font-black mb-2; }
      h2 { @apply text-2xl font-bold; }
      h3 { @apply text-xl font-bold; }
      p { @apply opacity-80; }
      
      .heading-row { @apply flex justify-between items-end gap-4 mb-4 flex-wrap; }
      .section-head-sticky {
        position: sticky;
        top: 0;
        z-index: 4;
        padding-bottom: 0.75rem;
        margin-bottom: 0.75rem;
        background: linear-gradient(180deg, color-mix(in srgb, var(--theme-bg) 90%, transparent), color-mix(in srgb, var(--theme-bg) 72%, transparent));
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .chip, .meta-chip, .state-pill { 
        border: var(--theme-border);
        border-radius: var(--theme-radius);
        background: var(--theme-card);
        @apply inline-flex items-center gap-2 px-3 py-1 text-sm font-bold; 
      }
      
      .stack-button { @apply flex flex-col items-start gap-1 justify-center leading-tight; }
      .stack-button small { @apply text-[11px] font-bold opacity-80; }
      .button-grid-3 { @apply grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-4; }
      .actions, .light-actions { @apply mt-4 grid grid-cols-2 gap-3; }
      .section-stack { @apply flex flex-col gap-5; }
      .section-stack-sticky { @apply gap-3; }
      
      .lights { @apply grid grid-cols-2 2xl:grid-cols-4 gap-4 mt-4; }
      .card-top { @apply flex justify-between items-start gap-3; }
      .icon-refresh-btn { 
        @apply bg-transparent text-2xl leading-none cursor-pointer w-10 h-10 flex items-center justify-center transition-all opacity-80 hover:opacity-100;
        color: var(--theme-text);
      }
      .program-icon {
        @apply relative flex items-center justify-center mr-3;
        font-size: 1.15rem;
        font-weight: 900;
        line-height: 1;
        color: inherit;
      }
      .program-action-label { @apply text-sm leading-tight mt-2; opacity: 1 !important; color: inherit; }
      
      .sensor-grid { @apply grid grid-cols-1 md:grid-cols-2 gap-4; }
      .sensor-controls {
        @apply flex items-center justify-end gap-3 flex-wrap;
      }
      .sensor-stat-head { @apply flex items-start justify-between gap-3 mb-2; }
      .sensor-stat-title { @apply text-[11px] uppercase tracking-wider font-bold opacity-70; }
      .sensor-stat-value { @apply text-xl font-black leading-none text-right; color: var(--theme-text); }
      .sensor-chart { @apply mt-4 relative h-40 rounded opacity-80 p-3 overflow-hidden border border-current; border-radius: min(var(--theme-radius), 20px); }
      .sensor-chart-svg { @apply w-full h-full block; }
      .sensor-foot { @apply flex items-center justify-between gap-3 text-[11px] font-bold tracking-wider uppercase mt-3 opacity-70; }
      .select-inline { @apply w-auto px-3 py-1 text-xs; }
      .sensor-range { @apply flex items-center gap-3 flex-wrap; }
      
      .data-report-grid { @apply grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mt-5; }
      .data-surface { @apply col-span-1 md:col-span-3 lg:col-span-2; }
      .data-kpi-card small, .data-surface small { @apply text-xs font-bold tracking-widest uppercase opacity-70; }
      .data-kpi-card strong { @apply text-3xl font-black; }
      .data-kpi-grid { @apply grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4; }
      .factory-report-shell { @apply flex flex-col gap-5 mt-4; min-width: 0; }
      .factory-report-toolbar { @apply flex items-center gap-3 flex-wrap justify-between; }
      .factory-report-tools { @apply flex items-center gap-3 flex-wrap; }
      .factory-report-kpis { @apply grid gap-4; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .factory-report-kpi { @apply p-4; border: var(--theme-border); border-radius: var(--theme-radius); background: color-mix(in srgb, var(--theme-card) 92%, transparent); box-shadow: var(--theme-shadow); }
      .factory-report-kpi-label { @apply text-xs font-bold uppercase tracking-wider opacity-70; }
      .factory-report-kpi-value { @apply mt-3 text-3xl lg:text-5xl font-black tracking-tight leading-none text-center; }
      .factory-report-kpi-note { @apply mt-3 text-xs font-bold opacity-60 text-center; }
      .factory-report-machine-list { @apply grid gap-4; grid-template-columns: repeat(auto-fit, minmax(min(100%, 520px), 1fr)); min-width: 0; }
      .factory-report-machine-card { @apply p-4 flex flex-col gap-4; min-width: 0; border: var(--theme-border); border-radius: var(--theme-radius); background: color-mix(in srgb, var(--theme-card) 94%, transparent); box-shadow: var(--theme-shadow); transition: border-color .16s ease, background .16s ease; }
      .factory-report-machine-card.is-warning { background: color-mix(in srgb, #ef4444 12%, var(--theme-card)); border-color: color-mix(in srgb, #ef4444 34%, transparent); }
      .factory-report-machine-top { @apply flex items-start justify-between gap-3; }
      .factory-report-machine-title strong { @apply block text-lg font-black tracking-tight; }
      .factory-report-machine-title span { @apply block mt-1 text-sm font-bold opacity-70; }
      .factory-report-legend { @apply flex flex-wrap gap-3 items-center; }
      .factory-report-legend-chip { @apply inline-flex items-center gap-2 px-3 py-2 text-xs font-bold rounded-full; border: 1px solid color-mix(in srgb, var(--theme-text) 8%, transparent); background: color-mix(in srgb, var(--theme-primary) 7%, transparent); color: color-mix(in srgb, var(--theme-text) 84%, transparent); }
      .factory-report-legend-chip em { @apply not-italic opacity-70; }
      .factory-report-swatch { @apply inline-block w-2.5 h-2.5 rounded-full; }
      .factory-report-swatch.output { background: var(--theme-series-2); }
      .factory-report-swatch.efficiency { background: var(--theme-series-5); }
      .factory-report-swatch.material { background: var(--theme-series-3); }
      .factory-report-trend-shell { @apply relative p-3 overflow-hidden; min-width: 0; width: 100%; border-radius: min(var(--theme-radius), 22px); border: 1px solid color-mix(in srgb, var(--theme-text) 8%, transparent); background: color-mix(in srgb, var(--theme-primary) 5%, transparent); }
      .factory-report-trend-shell.is-warning { background: color-mix(in srgb, #ef4444 10%, transparent); border-color: color-mix(in srgb, #ef4444 28%, transparent); }
      .factory-report-trend-svg { display: block; width: 100%; height: auto; }
      .factory-report-trend-grid { stroke: color-mix(in srgb, var(--theme-text) 12%, transparent); stroke-width: 1; }
      .factory-report-trend-axis { stroke: color-mix(in srgb, var(--theme-text) 18%, transparent); stroke-width: 1; }
      .factory-report-trend-label { fill: color-mix(in srgb, var(--theme-text) 72%, transparent); font-size: 11px; font-weight: 800; }
      .factory-report-trend-pane-title { fill: color-mix(in srgb, var(--theme-text) 88%, transparent); font-size: 11px; font-weight: 900; }
      .factory-report-trend-bar { fill: var(--theme-series-2); opacity: 0.82; }
      .factory-report-trend-line { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .factory-report-trend-line.efficiency { stroke: var(--theme-series-5); }
      .factory-report-trend-line.material { stroke: var(--theme-series-3); }
      .factory-report-trend-area { fill: color-mix(in srgb, var(--theme-series-3) 18%, transparent); stroke: none; }
      .factory-report-trend-hover-line { stroke: color-mix(in srgb, var(--theme-text) 22%, transparent); stroke-width: 2; opacity: 0; }
      .factory-report-trend-dot { opacity: 0; stroke: var(--theme-card); stroke-width: 3; }
      .factory-report-trend-dot.efficiency { fill: var(--theme-series-5); }
      .factory-report-trend-dot.material { fill: var(--theme-series-3); }
      .factory-report-trend-hitbox { fill: transparent; cursor: crosshair; }
      .factory-report-tooltip { position: absolute; left: 12px; top: 12px; min-width: 210px; padding: 10px 12px; border-radius: min(var(--theme-radius), 18px); background: color-mix(in srgb, var(--theme-card) 96%, transparent); border: var(--theme-border); box-shadow: var(--theme-shadow); opacity: 0; pointer-events: none; transform: translate3d(0, 8px, 0); transition: opacity 0.14s ease, transform 0.14s ease; font-size: 0.8rem; line-height: 1.5; }
      .factory-report-tooltip strong { @apply block mb-1; }
      .factory-report-meta { @apply grid gap-3 text-sm font-bold opacity-80; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .factory-report-meta b { color: var(--theme-text); }
      .factory-report-warn-chip { @apply inline-flex items-center gap-2 px-3 py-2 text-[11px] font-black uppercase tracking-widest rounded-full; background: rgba(239, 68, 68, 0.14); color: #b91c1c; border: 1px solid rgba(239, 68, 68, 0.28); }
      .factory-report-warn-chip::before { content: ""; @apply inline-block w-2 h-2 rounded-full; background: currentColor; }
      .factory-report-table-wrap { @apply overflow-auto mt-3; width: 100%; max-width: 100%; border-radius: 20px; border: 1px solid color-mix(in srgb, var(--theme-text) 8%, transparent); }
      .factory-report-table-wrap table { @apply w-full border-collapse; min-width: 1320px; }
      .factory-report-table-wrap th, .factory-report-table-wrap td { @apply px-4 py-3 text-left text-sm whitespace-nowrap; }
      .factory-report-table-wrap thead th { @apply text-[11px] font-black uppercase tracking-widest sticky top-0; background: color-mix(in srgb, var(--theme-card) 94%, transparent); color: color-mix(in srgb, var(--theme-text) 74%, transparent); }
      .factory-report-table-wrap tbody tr + tr td { border-top: 1px solid color-mix(in srgb, var(--theme-text) 8%, transparent); }
      .factory-report-table-wrap tbody tr.warn-row td { background: color-mix(in srgb, #ef4444 8%, transparent); }
      .factory-report-pager { @apply flex items-center justify-end gap-3 flex-wrap mt-4; }
      .factory-report-pager-info { @apply text-sm font-bold opacity-70; }
      .factory-report-empty { @apply p-6 text-center font-bold opacity-70 border border-dashed border-current rounded-2xl; }
      .factory-report-modal { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(12, 18, 28, 0.48); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
      .factory-report-modal.is-open { display: flex; }
      .factory-report-modal-card { @apply w-full max-w-2xl p-6 flex flex-col gap-5; border: var(--theme-border); border-radius: var(--theme-radius); background: var(--theme-card); box-shadow: var(--theme-shadow); }
      .factory-report-modal-head { @apply flex justify-between items-start gap-3; }
      .factory-report-form { @apply grid gap-4; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .factory-report-field { @apply grid gap-2; }
      .factory-report-field span { @apply text-sm font-bold; }
      .factory-report-field input { @apply w-full px-4 py-3 outline-none; border: var(--theme-border); border-radius: var(--theme-radius); background: var(--theme-btn-bg); color: var(--theme-btn-text); box-shadow: var(--theme-shadow); }
      .factory-report-field input[readonly] { opacity: 0.82; cursor: default; }
      .factory-report-actions { @apply flex justify-end gap-3; }
      @media (max-width: 900px) {
        .factory-report-toolbar, .factory-report-tools, .factory-report-pager { @apply justify-start; }
        .factory-report-form, .factory-report-meta { grid-template-columns: 1fr; }
      }

      .widget-grid { @apply grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4; }
      .widget-chart-y-label, .sensor-chart-y-label { color: var(--theme-text); @apply absolute left-3 text-[10px] font-bold tracking-wider opacity-70 pointer-events-none leading-none; }
      .widget-chart-y-label[data-align="max"], .sensor-chart-y-label[data-align="max"] { top: 0.5rem; }
      .widget-chart-y-label[data-align="min"], .sensor-chart-y-label[data-align="min"] { bottom: 1rem; }
      .widget-chart-axis line, .sensor-chart-axis line { stroke: var(--theme-text); @apply stroke-[1.2px] opacity-40; }
      .widget-chart-grid line, .sensor-chart-grid line { stroke: var(--theme-text); @apply stroke-[1px] opacity-20; }
      .widget-chart-path { stroke: var(--series-color, var(--theme-primary)); @apply fill-none stroke-[3px] opacity-90; }
      .sensor-chart-path { stroke: var(--theme-primary); @apply fill-none stroke-[3px] opacity-90; }
      .sensor-chart-area { fill: var(--theme-primary); @apply opacity-20; }
      
      .modal-overlay { @apply hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4; }
      .modal-card { @apply w-full max-w-sm; }
      .modal-head { @apply flex justify-between items-center mb-6; }
      .icon-button { @apply w-9 h-9 flex items-center justify-center rounded-full opacity-80 hover:opacity-100 text-xl font-light; background: transparent; color: var(--theme-text); border: var(--theme-border); }
      .is-open { @apply flex; }
      .is-hidden { @apply hidden !important; }
      .media-root { @apply w-full h-full flex items-start justify-center; }
      #control-view-section {
        @apply p-3 md:p-5;
      }
      .media-shell {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        max-height: 30vh;
        overflow: auto;
        scroll-padding-top: 1rem;
      }
      .media-image-feed { @apply w-full h-auto object-contain mx-auto; max-height: 30vh; border-radius: var(--theme-radius); }
      .media-feed { @apply block w-full border-0; }
      .media-stage { @apply origin-top-left transform-gpu; }
      
      .toast-stack { @apply fixed left-1/2 bottom-10 -translate-x-1/2 z-50 flex flex-col gap-3 w-[min(calc(100vw-28px),380px)] pointer-events-none; }
      .toast { background: var(--theme-card); color: var(--theme-text); border: var(--theme-border); box-shadow: var(--theme-shadow); border-radius: var(--theme-radius); @apply px-4 py-3 font-bold; }
      .toast.success { border-bottom-color: #10b981; border-bottom-width: 4px; }
      .toast.error { border-bottom-color: #f43f5e; border-bottom-width: 4px; }

      /* Subhead logic for colors */
      .subhead { @apply block mb-2 text-[11px] uppercase tracking-wider font-bold; }
      .status-dot { @apply w-2 h-2 rounded-full bg-slate-400; }
      .status-dot.ok { @apply bg-green-500 shadow-[0_0_8px_#22c55e]; }
      
      /* Result boxes */
      .result-label { @apply self-start p-3 text-sm font-bold opacity-90; }
      .error-box { @apply bg-rose-500/20 text-rose-500 border border-rose-500 font-bold p-4 mt-4; border-radius: var(--theme-radius); }
      .empty-box { @apply bg-black/5 text-current font-bold p-4 mt-4 opacity-70 border border-dashed border-current; border-radius: var(--theme-radius); }
      .result-box { @apply p-4 mt-4 overflow-hidden; border: var(--theme-border); border-radius: var(--theme-radius); }
      .result-box header { @apply pb-2 mb-2 font-bold opacity-80 border-b border-current; }
      .result-box pre { @apply overflow-auto text-sm font-mono opacity-90; }
      
      .range-row { @apply mt-4 p-4 opacity-90; background: var(--theme-card); border: var(--theme-border); border-radius: var(--theme-radius); }
      .range-head { @apply flex items-center justify-between text-sm font-bold opacity-80; }
      .range { @apply mt-3 w-full bg-transparent; }

      .widget-chart-shell { @apply mt-4 relative min-h-[220px] p-4; }
      .widget-chart-head { @apply flex items-end justify-between gap-3 mb-3; }
      .widget-chart-svg { @apply w-full h-[200px]; }
      .widget-legend { @apply flex flex-wrap gap-3; }
      .widget-legend-item { @apply inline-flex items-center gap-2 text-xs font-bold opacity-80; }
      .widget-legend-dot { @apply w-2.5 h-2.5 rounded-full; background: var(--series-color, var(--theme-primary)); }
      .widget-chart-hover-point, .sensor-chart-hover-point { fill: var(--theme-card); stroke: var(--series-color, var(--theme-primary)); stroke-width: 3; }
      .widget-chart-tooltip-swatch { @apply inline-block w-2.5 h-2.5 rounded-full mr-2; background: var(--series-color, var(--theme-primary)); }
      .widget-chart-empty, .sensor-chart-empty { stroke: var(--theme-text); @apply opacity-20 fill-none stroke-[2px]; }
      .widget-chart-hover-line, .sensor-chart-hover-line { stroke: var(--theme-text); @apply opacity-30 stroke-[1.5px]; }
      .widget-chart-hitbox, .sensor-chart-hitbox { @apply fill-transparent cursor-pointer; }
      [data-series-index="0"] { --series-color: var(--theme-series-1); }
      [data-series-index="1"] { --series-color: var(--theme-series-2); }
      [data-series-index="2"] { --series-color: var(--theme-series-3); }
      [data-series-index="3"] { --series-color: var(--theme-series-4); }
      [data-series-index="4"] { --series-color: var(--theme-series-5); }
      [data-series-index="5"] { --series-color: var(--theme-series-6); }
      .data-chart-bar { fill: var(--theme-primary); opacity: 0.88; }
      .data-chart-line { stroke: var(--theme-primary); fill: none; opacity: 0.92; }
      .data-chart-area { fill: var(--theme-primary); opacity: 0.16; }
      .data-chart-point { fill: var(--theme-card); stroke: var(--theme-primary); stroke-width: 3; }
      
      .data-table-shell { @apply overflow-auto mt-4; border: var(--theme-border); border-radius: var(--theme-radius); }
      .data-table-shell table { @apply w-full border-collapse min-w-[420px]; }
      .data-table-shell th, .data-table-shell td { @apply p-3 text-left opacity-90 border-b border-current; }
      .data-table-shell th { @apply text-xs font-bold uppercase tracking-wider bg-black/5; }
      .data-table-shell td { @apply text-sm font-bold whitespace-nowrap; }

      .light-card { @apply relative; }
      .light-card[data-state="off"] {
        background: color-mix(in srgb, var(--theme-card) 92%, transparent) !important;
      }
      .light-card[data-state="on"] {
        background: color-mix(in srgb, var(--theme-series-4) 14%, var(--theme-card)) !important;
        box-shadow: var(--theme-shadow), 0 0 0 1px color-mix(in srgb, var(--theme-series-3) 26%, transparent);
      }
      .light-card[data-state="pending"] {
        background: color-mix(in srgb, var(--theme-series-2) 12%, var(--theme-card)) !important;
        box-shadow: var(--theme-shadow), 0 0 0 1px color-mix(in srgb, var(--theme-series-4) 26%, transparent);
      }
      .light-action-button {
        @apply transition-all duration-150;
        min-width: 0;
      }
      .light-actions .btn {
        @apply px-2 py-2 text-sm;
      }
      .light-action-button[aria-pressed="true"] {
        box-shadow: var(--theme-shadow), 0 0 0 2px currentColor;
      }
      .light-card[data-state="on"] [data-slot="on-button"],
      .light-card[data-state="off"] [data-slot="off-button"],
      .light-card[data-state="pending"] [data-slot="refresh"] {
        outline: 2px solid currentColor;
        outline-offset: 2px;
      }

      .widget-toggle { @apply relative mx-auto w-full max-w-[190px] p-3; border: var(--theme-border); border-radius: var(--theme-radius); }
      .widget-toggle-track { @apply relative h-[240px] overflow-hidden; border-radius: max(0px, calc(var(--theme-radius) - 6px)); background: rgba(0,0,0,0.05); }
      .widget-toggle-zone { @apply absolute left-0 right-0 h-1/2 bg-transparent text-xs font-black uppercase tracking-widest z-10 flex items-center justify-center opacity-70 hover:opacity-100 transition-opacity; color: var(--theme-text); border:none; }
      .widget-toggle-zone.top { @apply top-0; }
      .widget-toggle-zone.bottom { @apply bottom-0; }
      .widget-toggle-lever { @apply absolute left-3 right-3 h-[calc(50%-12px)] flex items-center justify-center z-0 transition-all duration-300; border: var(--theme-border); border-radius: max(0px, calc(var(--theme-radius) - 6px)); background: var(--theme-card); box-shadow: var(--theme-shadow); }

        var scaledHeight = sourceHeight * scale;

        controlViewStage.style.setProperty("--media-source-width", sourceWidth + "px");
        controlViewStage.style.setProperty("--media-source-height", sourceHeight + "px");
        controlViewStage.style.transform = "scale(" + scale + ")";
        controlViewShell.style.height = clampedHeight + "px";

        applyResponseState(command, label, data);
        applyImmediateState(command);
        errorBox.classList.add("is-hidden");
        emptyBox.classList.add("is-hidden");
        resultBox.classList.remove("is-hidden");
        resultCommand.textContent = command;
        resultJson.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
        resultMeta.textContent = label + " - " + formatTimestamp(new Date());
        setBusy(false, false);
        showToast(label + " completed.", "success");
      }

      function buildSensorStreamUrl(sessionId, peripherals) {
        var params = new URLSearchParams();
        params.set("historyMs", String(SENSOR_HISTORY_WINDOW_MS));
        if (Array.isArray(peripherals) && peripherals.length > 0) {
          params.set("fields", peripherals.join(","));
        }
        var query = params.toString();
        return buildAppApiUrl("/api/" + encodeURIComponent(sessionId) + "/stream" + (query ? "?" + query : ""));
      }

      function handleSensorStreamEvent(sessionId, data) {
        if (!data || !data.type) {
          return;
        }

        if (sessionId !== IOT_SESSION_ID) {
          return;
        }

        if (data.type === "heartbeat") {
          return;
        }

        if (data.type === "billing_blocked") {
          sensorStreamBlocked = true;
          setSensorLiveState("Top up required", true);
          showToast(data.message || "Sensor ingest is blocked until this IoT session is topped up.", "error");
          return;
        }

        if (data.type === "telemetry") {
          applyTelemetryPayload(data.payload || {}, Number(data.serverTime || Date.now()));
          setSensorLiveState("Telemetry live", false);
          return;
        }

        if (data.type === "timeseries" && Array.isArray(data.rows)) {
          data.rows.forEach(function (row) {
            applyPeripheralValue(row.field, row.value, Number(row.ts || Date.now()));
          });
          setSensorLiveState("Telemetry live", false);
          return;
        }

        if (data.type === "iodata_changed") {
          scheduleDataReportRefresh(data.macro || data.source || "iodata_changed");
        }
      }

      function connectSessionStream(sessionConfig) {
        if (!sessionConfig || !sessionConfig.sessionId || sensorStreamBlocked || typeof EventSource === "undefined") {
          return;
        }

        var sessionId = String(sessionConfig.sessionId).trim();
        var existing = sensorStreams.get(sessionId);
        if (existing) {
          existing.close();
          sensorStreams.delete(sessionId);
        }

        var stream = new EventSource(buildSensorStreamUrl(sessionId, sessionConfig.peripherals || []));
        sensorStreams.set(sessionId, stream);

        stream.onmessage = function (event) {
          try {
            var data = JSON.parse(event.data);
            handleSensorStreamEvent(sessionId, data);
          } catch (error) {
            console.error("Failed to process sensor stream event", error);
          }
        };

        stream.onerror = function () {
          var current = sensorStreams.get(sessionId);
          if (current) {
            current.close();
            sensorStreams.delete(sessionId);
          }

          if (sensorStreamBlocked) {
            return;
          }

          setSensorLiveState("Reconnecting...", true);
          window.setTimeout(function () {
            if (!sensorStreamBlocked) {
              connectSessionStream(sessionConfig);
            }
          }, 3000);
        };
      }

      function connectSensorStreams() {
        if (!PRIMARY_SESSION || !PRIMARY_SESSION.sessionId) {
          setSensorLiveState("Telemetry offline", true);
          return;
        }

        sensorStreams.forEach(function (stream) {
          if (stream && typeof stream.close === "function") {
            stream.close();
          }
        });
        sensorStreams.clear();

        connectSessionStream(PRIMARY_SESSION);
      }

      function setHistoryWindow(nextHistoryWindowMs) {
        var nextValue = Number(nextHistoryWindowMs);
        if (!Number.isFinite(nextValue) || nextValue <= 0 || nextValue === SENSOR_HISTORY_WINDOW_MS) {
          updateHistoryWindowLabels();
          return;
        }

        SENSOR_HISTORY_WINDOW_MS = Math.round(nextValue);
        Object.keys(chartConfigs).forEach(function (key) {
            sensorSeriesByKey[key] = [];
            chartConfigs[key].series = [];
            renderSensorChart(key);
          });
        updateHistoryWindowLabels();
        setSensorLiveState("Reloading history...", false);
        connectSensorStreams();
      }

      async function runCommand(command, label, sessionIndex) {
        var rawCommand = String(command || "").trim();
        if (!rawCommand || busy) {
          return;
        }

        var normalizedCommand = window.AIBridgeCommandTemplate && typeof window.AIBridgeCommandTemplate.resolveCommandTemplate === "function"
          ? await window.AIBridgeCommandTemplate.resolveCommandTemplate(rawCommand)
          : rawCommand
            .replace(/<<email>>/gi, "")
            .replace(/<<username>>/gi, "");
        if (!normalizedCommand) {
          return;
        }

        var commandApiUrl = resolveCommandApiUrl(sessionIndex);
        if (!commandApiUrl) {
          showError("IoT command endpoint is not configured for this session.");
          return;
        }

        var commandParts = normalizedCommand.split(";").map(function (part) {
          return part.trim();
        }).filter(Boolean);

        if (commandParts.length > 8) {
          showError("A maximum of 8 read targets can be requested at the same time.");
          return;
        }

        setBusy(true, false);
        errorBox.classList.add("is-hidden");

        var controller = new AbortController();
        var timeoutId = window.setTimeout(function () {
          controller.abort();
        }, 5000);

        try {
          var response = await fetch(commandApiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ cmd: normalizedCommand }),
            signal: controller.signal
          });

          var rawText = await response.text();
          if (!response.ok) {
            throw new Error(rawText || ("Request failed with status " + response.status));
          }

          showResult(label, normalizedCommand, normalizePayload(rawText));
        } catch (error) {
          if (error && error.name === "AbortError") {
            showError("The device did not answer within 5 seconds.");
          } else {
            showError((error && error.message) || "Command failed.");
          }
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      document.addEventListener("click", function (event) {
        var themeOption = event.target && typeof event.target.closest === "function"
          ? event.target.closest("[data-theme-option]")
          : null;
        if (themeOption) {
          setDashboardTheme(themeOption.getAttribute("data-theme-option"));
          closeThemePickerMenu();
          return;
        }

        var themeToggle = event.target && typeof event.target.closest === "function"
          ? event.target.closest("#theme-picker-toggle")
          : null;
        if (themeToggle) {
          if (themePickerMenu && themePickerMenu.classList.contains("is-open")) {
            closeThemePickerMenu();
          } else {
            openThemePickerMenu();
          }
          return;
        }

        if (themePickerMenu && !themePickerMenu.contains(event.target)) {
          closeThemePickerMenu();
        }

        var target = event.target;
        var button = target && typeof target.closest === "function" ? target.closest("[data-command]") : null;
        if (!button) {
          return;
        }
          if (button.getAttribute("data-action-kind") === "parameterized") {
            return;
          }
        if (button.hasAttribute("disabled") || button.getAttribute("aria-disabled") === "true") {
          return;
        }
        var pendingText = String(button.getAttribute("data-pending-state") || "").trim();
        if (pendingText) {
          document.dispatchEvent(new CustomEvent("ai-bridge-command-pending", {
              detail: {
                scope: "surface-switch",
                label: pendingText
              }
            }));
        }
        runCommand(
          button.getAttribute("data-command"),
          button.getAttribute("data-label") || "Command",
          getSessionIndexFromElement(button)
        );
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          closeThemePickerMenu();
        }
      });

      function restartDataRefreshTimer() {
        if (dataRefreshTimer) {
          window.clearInterval(dataRefreshTimer);
          dataRefreshTimer = 0;
        }

        if (CONFIGURED_DATA_REFRESH_MS > 0) {
          dataRefreshTimer = window.setInterval(function () {
            refreshDataViews().catch(function (error) {
              console.error("Failed to refresh IoData report widgets", error);
            });
          }, CONFIGURED_DATA_REFRESH_MS);
        }
      }

      function initializeDashboardRuntime() {
        applyLayoutManifest();

        window.AIBridgeDashboardRuntime = {
          runCommand: runCommand,
          showToast: showToast,
          getSessionIndex: getSessionIndexFromElement,
          setHistoryWindow: setHistoryWindow,
          renderLightWidgetLayout: renderLightWidgetLayout,
          renderSensorWidgetLayout: renderSensorWidgetLayout,
          renderBusinessReportLayout: renderBusinessReportLayout,
          refreshDataViews: refreshDataViews,
          runIoDataMacro: runIoDataMacro,
          getDataSyncId: getDataSyncId
        };

        (window.AIBridgeDashboardBoot || []).forEach(function (initializer) {
          if (typeof initializer === "function") {
            try {
              initializer(window.AIBridgeDashboardRuntime);
            } catch (error) {
              console.error("Dashboard boot initializer failed", error);
            }
          }
        });

        setDashboardTheme(getActiveThemeName());
        renderLightWidgetLayout();
        renderSensorWidgetLayout();
        renderBusinessReportLayout();
        bindDynamicWidgetRefs();

        Object.keys(chartConfigs).forEach(function (name) {
          var config = chartConfigs[name];
          if (!config || !config.hitbox) {
            return;
          }
          config.hitbox.addEventListener("mousemove", function (event) {
            showChartTooltip(name, event);
          });
          config.hitbox.addEventListener("mouseleave", function () {
            hideChartTooltip(name);
          });
        });

        updateHistoryWindowLabels();
        setSensorLiveState("Loading sensors...", false);
        connectSensorStreams();
        restartDataRefreshTimer();
        refreshDataViews().catch(function (error) {
          console.error("Failed to load IoData report widgets", error);
        });
      }

      window.addEventListener("resize", function () {
        if (window.AIBridgeDashboardRuntime && typeof window.AIBridgeDashboardRuntime.updateControlViewScale === "function") {
          window.AIBridgeDashboardRuntime.updateControlViewScale();
        }
      });

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeDashboardRuntime, { once: true });
      } else {
        initializeDashboardRuntime();
      }
    })();
  </script>
  <!-- AI-BRIDGE-LOCKED RUNTIME SCRIPT: END -->
