<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tưới cây tuần tự</title>
  <link rel="stylesheet" href="/dashboard-themes.css?v=2026.04.18" />
  <link rel="stylesheet" href="/sample_dashboards/irrigation-timer-control/dashboard.css?v=2026.05.29.2" />
  <link rel="stylesheet" href="/sample_dashboards/irrigation-timer-control/dashboard-sequential.css?v=2026.05.30.2" />
  <script>
    (function () {
      try {
        var savedTheme = window.localStorage.getItem("sample-dashboard-theme");
        if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
      } catch (error) { }
    })();
  </script>
</head>

<body>
  <!-- AI-BRIDGE-EDITABLE HTML LAYOUT: START -->
  <main class="page-shell">
    <section class="hero">
      <div>
        <h1 id="hero-title">Tưới cây tuần tự</h1>
      </div>
      <div class="hero-tools">
        <button class="toolbar-button" type="button" id="history-refresh">Tải lại lịch sử</button>
        <div class="hero-chip" id="control-count-chip">0 van</div>
      </div>
    </section>

    <section class="history-card" id="history-card">
      <div class="section-head history-head" id="history-toggle" role="button" tabindex="0" aria-expanded="false"
        onclick="(function(card){var content=card&&card.querySelector('#history-content');var toggle=card&&card.querySelector('#history-toggle');if(!content)return;var collapsed=!content.hidden;content.hidden=collapsed;if(toggle)toggle.setAttribute('aria-expanded',collapsed?'false':'true');if(card)card.setAttribute('data-collapsed',collapsed?'true':'false');})(this.closest('#history-card'))">
        <div class="section-toggle history-toggle">
          <span class="history-title"><h2>Lịch sử</h2></span>
          <span class="section-toggle-indicator">&#9662;</span>
        </div>
        <div class="section-toolbar">
          <div class="hero-chip" id="history-source-chip" onclick="event.stopPropagation()">Nguồn lịch sử</div>
        </div>
      </div>
      <div class="table-wrap" id="history-content" hidden>
        <table class="history-table">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Khu tưới</th>
              <th>Loại</th>
              <th>Nội dung</th>
              <th>Người thực hiện</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr>
              <td colspan="5" class="empty-state">Đang chờ dữ liệu lịch sử.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="sequential-card" id="devices-card">
      <div class="sequential-head">
        <h2 id="devices-title">Tuyến tưới</h2>
        <div class="live-pill" id="controls-live" data-state="connecting">Đang kết nối</div>
      </div>
      <div class="device-list" id="device-list"></div>
    </section>
  </main>

  <div class="modal" id="schedule-modal" aria-hidden="true">
    <div class="modal-card schedule-modal-card">
      <div class="modal-head">
        <div>
          <h2 id="schedule-modal-title">Lịch tưới</h2>
          <p id="schedule-modal-description">Lịch bật máy bơm đang chọn.</p>
        </div>
        <button type="button" class="icon-button" id="schedule-modal-close" aria-label="Đóng hộp thoại">&times;</button>
      </div>
      <div class="table-wrap schedule-table-wrap">
        <table class="schedule-table-on-only">
          <thead>
            <tr>
              <th>Kích hoạt</th>
              <th>Thời điểm bật</th>
            </tr>
          </thead>
          <tbody id="schedule-body">
            <tr>
              <td colspan="2" class="empty-state">Chưa có lịch tưới.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-button" id="schedule-modal-cancel">Đóng</button>
        <button type="button" class="modal-button primary" id="schedule-modal-save">Lưu lịch</button>
      </div>
    </div>
  </div>

  <div class="modal" id="duration-modal" aria-hidden="true">
    <div class="modal-card duration-modal-card">
      <div class="modal-head">
        <div>
          <h2 id="duration-modal-title">Thời gian tưới</h2>
          <p id="duration-modal-description">Cài thời gian mở van đang chọn.</p>
        </div>
        <button type="button" class="icon-button" id="duration-modal-close" aria-label="Đóng hộp thoại">&times;</button>
      </div>
      <div class="duration-form">
        <div class="duration-form-row">
          <label>
            Thời gian
            <input id="duration-value" type="number" min="0" step="1" inputmode="numeric" />
          </label>
          <label>
            Đơn vị
            <select id="duration-unit">
              <option value="seconds">Giây</option>
              <option value="minutes">Phút</option>
            </select>
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-button" id="duration-modal-cancel">Đóng</button>
        <button type="button" class="modal-button primary" id="duration-modal-save">Lưu thời gian</button>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <div class="theme-picker" id="theme-picker">
    <button class="theme-picker-toggle" type="button" id="theme-picker-toggle" aria-label="Chọn giao diện"
      aria-haspopup="true" aria-expanded="false">&#127912;</button>
    <div class="theme-picker-menu" id="theme-picker-menu" role="menu" aria-label="Tùy chọn giao diện">
      <button class="theme-menu-button" type="button" data-theme-option="neumorphism"
        role="menuitemradio">Neumorphism</button>
      <button class="theme-menu-button" type="button" data-theme-option="aurora-ui" role="menuitemradio">Aurora
        UI</button>
      <button class="theme-menu-button" type="button" data-theme-option="modern-flat" role="menuitemradio">Modern
        Flat</button>
      <button class="theme-menu-button" type="button" data-theme-option="glassmorphism"
        role="menuitemradio">Glassmorphism</button>
      <button class="theme-menu-button" type="button" data-theme-option="cyberpunk"
        role="menuitemradio">Cyberpunk</button>
      <button class="theme-menu-button" type="button" data-theme-option="neo-brutalism" role="menuitemradio">Neo
        Brutalism</button>
      <button class="theme-menu-button" type="button" data-theme-option="bento-grid" role="menuitemradio">Bento
        Grid</button>
    </div>
  </div>
  <!-- AI-BRIDGE-EDITABLE HTML LAYOUT: END -->
