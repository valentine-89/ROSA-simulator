<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mixer</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5f6b7a;
      --line: #d9e0ea;
      --panel: #ffffff;
      --soft: #f5f7fa;
      --teal: #0f766e;
      --teal-soft: #dff6f2;
      --coral: #c2412d;
      --coral-soft: #ffe8df;
      --gold: #a16207;
      --gold-soft: #fff4c7;
      --shadow: 0 18px 42px rgba(21, 32, 43, 0.14);
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef3f7 0%, #fbfcfd 42%, #eef5f1 100%);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      width: min(480px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 88px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 12px;
      align-items: start;
      padding: 12px 0 10px;
    }
    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 28px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #0f5f59;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }
    .pill[data-tone="warm"] { background: var(--gold-soft); color: var(--gold); }
    .pill[data-tone="alert"] { background: var(--coral-soft); color: var(--coral); }
    h1 {
      margin: 8px 0 4px;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtext {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.42;
    }
    .icon-button {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(21, 32, 43, 0.08);
    }
    .tabs {
      position: sticky;
      top: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px 0 10px;
      background: linear-gradient(180deg, rgba(238, 243, 247, 0.98), rgba(238, 243, 247, 0.9));
      backdrop-filter: blur(12px);
    }
    .tab {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 800;
    }
    .tab[aria-selected="true"] {
      background: #16212d;
      border-color: #16212d;
      color: #fff;
    }
    .panel { display: none; }
    .panel.is-active { display: block; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 4px 0 12px;
    }
    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 10px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .metric strong {
      display: block;
      margin-top: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
    }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      padding: 0 14px;
      font-weight: 800;
    }
    .filter.is-active {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }
    .menu-search {
      margin: 0 0 10px;
    }
    .menu-search input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      box-shadow: 0 6px 16px rgba(21, 32, 43, 0.05);
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .menu-item, .work-item, .history-item {
      display: grid;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      padding: 12px;
      text-align: left;
      box-shadow: 0 8px 20px rgba(21, 32, 43, 0.07);
    }
    .menu-item {
      grid-template-columns: 62px 1fr;
      align-items: center;
    }
    .drink-mark {
      width: 62px;
      height: 62px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background:
        radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.7), transparent 28%),
        linear-gradient(135deg, #0f766e, #c2412d);
    }
    .drink-mark[data-tone="tea"] { background: linear-gradient(135deg, #0f766e, #a16207); }
    .drink-mark[data-tone="matcha"] { background: linear-gradient(135deg, #3f7d20, #0f766e); }
    .drink-mark[data-tone="cacao"] { background: linear-gradient(135deg, #4a2d22, #c2412d); }
    .drink-media {
      position: relative;
      width: 62px;
      height: 62px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--teal-soft);
    }
    .drink-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .drink-media .drink-mark {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .item-head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .item-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }
    .price {
      flex: 0 0 auto;
      color: var(--teal);
      font-weight: 900;
      font-size: 14px;
    }
    .item-meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .menu-item .item-meta {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .work-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .order-no {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #16212d;
      color: #fff;
      font-weight: 900;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      line-height: 1.45;
    }
    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 12;
      display: none;
      padding: 12px;
      background: rgba(16, 24, 32, 0.42);
    }
    .sheet.is-open { display: block; }
    .sheet-inner {
      width: min(480px, 100%);
      margin: 0 auto;
      border-radius: 8px 8px 0 0;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .primary, .secondary {
      min-height: 46px;
      border-radius: 8px;
      font-weight: 900;
      border: 1px solid transparent;
    }
    .primary { background: var(--teal); color: #fff; }
    .primary:disabled { background: #9aa7b4; cursor: wait; }
    .secondary { background: #fff; color: var(--ink); border-color: var(--line); }
    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 18px;
      z-index: 20;
      width: min(452px, calc(100% - 28px));
      margin: 0 auto;
      border-radius: 8px;
      background: #16212d;
      color: #fff;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      display: none;
      line-height: 1.35;
    }
    .toast.is-open { display: block; }
    .toast[data-tone="bad"] { background: #8f2b1d; }
    @media (max-width: 360px) {
      .app { padding-inline: 10px; }
      h1 { font-size: 24px; }
      .summary { grid-template-columns: 1fr; }
      .menu-item { grid-template-columns: 52px 1fr; }
      .drink-mark,
      .drink-media { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="status-line">
          <span class="pill" id="machine-state">Đang tải</span>
          <span class="pill" data-tone="warm" id="queue-pill">0 đơn</span>
        </div>
        <h1 id="machine-name">Máy pha chế</h1>
        <p class="subtext" id="staff-line">...</p>
      </div>
      <button class="icon-button" id="refresh-button" type="button" aria-label="Tải lại">↻</button>
    </header>

    <nav class="tabs" aria-label="Mixer">
      <button class="tab" type="button" data-tab="catalog" aria-selected="true">Menu</button>
      <button class="tab" type="button" data-tab="stack" aria-selected="false">Đơn</button>
      <button class="tab" type="button" data-tab="history" aria-selected="false">Lịch sử</button>
    </nav>

    <section class="panel is-active" data-panel="catalog">
      <div class="summary">
        <div class="metric"><span>Số dư</span><strong id="balance-text">0</strong></div>
        <div class="metric"><span>Món</span><strong id="menu-count">0</strong></div>
        <div class="metric"><span>Vị trí</span><strong id="position-count">0</strong></div>
      </div>
      <label class="menu-search" aria-label="Tìm món">
        <input id="menu-search" type="search" placeholder="Tìm món..." autocomplete="off" />
      </label>
      <div class="filters" id="catalog-filters"></div>
      <div class="list" id="menu-list"></div>
    </section>

    <section class="panel" data-panel="stack">
      <div class="list" id="work-list"></div>
    </section>

    <section class="panel" data-panel="history">
      <div class="list" id="history-list"></div>
    </section>
  </main>

  <div class="sheet" id="confirm-sheet" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="sheet-inner">
      <div class="item-head">
        <div>
          <h2 class="item-title" id="confirm-title">Xác nhận</h2>
          <p class="item-meta" id="confirm-meta"></p>
        </div>
        <strong class="price" id="confirm-price"></strong>
      </div>
      <div class="sheet-actions">
        <button class="secondary" type="button" id="cancel-button">Đóng</button>
        <button class="primary" type="button" id="order-button">Pha chế</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var ids = pageIds();
      var state = {
        tab: "catalog",
        catalog: "Tất cả",
        search: "",
        selectedMenu: null,
        busy: false,
        loadingOrder: false,
        lastSubmitAt: 0,
        rows: [],
        link: {},
        menus: [],
        works: [],
        history: []
      };
      var nodes = {
        machineState: document.getElementById("machine-state"),
        queuePill: document.getElementById("queue-pill"),
        machineName: document.getElementById("machine-name"),
        staffLine: document.getElementById("staff-line"),
        balanceText: document.getElementById("balance-text"),
        menuCount: document.getElementById("menu-count"),
        positionCount: document.getElementById("position-count"),
        menuSearch: document.getElementById("menu-search"),
        filters: document.getElementById("catalog-filters"),
        menuList: document.getElementById("menu-list"),
        workList: document.getElementById("work-list"),
        historyList: document.getElementById("history-list"),
        sheet: document.getElementById("confirm-sheet"),
        confirmTitle: document.getElementById("confirm-title"),
        confirmMeta: document.getElementById("confirm-meta"),
        confirmPrice: document.getElementById("confirm-price"),
        cancelButton: document.getElementById("cancel-button"),
        orderButton: document.getElementById("order-button"),
        refreshButton: document.getElementById("refresh-button"),
        toast: document.getElementById("toast")
      };

      function pageIds() {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var iotIndex = parts.indexOf("iot-page");
        return {
          ioid: decodeURIComponent(parts[iotIndex + 1] || parts[0] || ""),
          pageid: decodeURIComponent(parts[iotIndex + 2] || parts[1] || "")
        };
      }

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function safeText(value, fallback) {
        var text = String(value == null ? "" : value).trim();
        return text || String(fallback || "");
      }

      function safeImageUrl(value) {
        var text = safeText(value, "");
        return /^https?:\/\//i.test(text) ? text : "";
      }

      function asNumber(value) {
        var parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function money(value) {
        try {
          return asNumber(value).toLocaleString("vi-VN") + "đ";
        } catch (error) {
          return String(value || "0") + "đ";
        }
      }

      function shortTime(value) {
        var ts = asNumber(value);
        if (!ts) return "";
        try {
          return new Date(ts).toLocaleString("vi-VN", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
        } catch (error) {
          return "";
        }
      }

      function apiUrl(path) {
        return path + "/" + encodeURIComponent(ids.ioid) + "/" + encodeURIComponent(ids.pageid);
      }

      function commandIoid(value) {
        var text = safeText(value, "");
        if (!text || text.indexOf("<") >= 0 || text.indexOf(">") >= 0) return ids.ioid;
        return text;
      }

      function postPublicMacro(macro, params) {
        return fetch(apiUrl("/api/iot-page-macro"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ macro: macro, params: params || {} })
        }).then(function (response) {
          return response.json().catch(function () { return null; }).then(function (data) {
            if (!response.ok || !data || data.ok === false) {
              throw new Error((data && (data.message || data.error)) || "Không thể tải dữ liệu.");
            }
            return Array.isArray(data.rows) ? data.rows : [];
          });
        });
      }

      function callStartCommand(row) {
        return fetch("/api/iot-cmd/" + encodeURIComponent(commandIoid(row.ioid)) + "/mixer-start-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            order_no: Math.max(1, Math.floor(asNumber(row.order_no))),
            ingredient_count: Math.max(0, Math.floor(asNumber(row.ingredient_count))),
            staff_phone: safeText(row.staff_phone, ""),
            stage_ids: safeText(row.stage_ids, ""),
            quantities: safeText(row.quantities, ""),
            menu_name: safeText(row.menu_name, "Mixer"),
            units: safeText(row.units, "")
          })
        }).then(function (response) {
          return response.json().catch(function () { return null; }).then(function (data) {
            if (!response.ok || !data || data.ok === false) {
              throw new Error((data && (data.message || data.error)) || "Không thể gửi lệnh máy.");
            }
            return data;
          });
        });
      }

      function toast(message, tone) {
        nodes.toast.textContent = message;
        nodes.toast.dataset.tone = tone || "ok";
        nodes.toast.classList.add("is-open");
        window.clearTimeout(toast.timer);
        toast.timer = window.setTimeout(function () {
          nodes.toast.classList.remove("is-open");
        }, 3600);
      }

      function parseRows(rows) {
        state.rows = rows || [];
        state.link = state.rows.filter(function (row) { return row.row_type === "link"; })[0] || {};
        state.menus = state.rows.filter(function (row) { return row.row_type === "menu"; });
        state.works = state.rows.filter(function (row) { return row.row_type === "work"; });
        state.history = state.rows.filter(function (row) { return row.row_type === "history"; });
        state.busy = Number(state.link.busy || 0) !== 0;
      }

      function loadState() {
        nodes.machineState.textContent = "Đang tải";
        return postPublicMacro("mixer-link-state", {}).then(function (rows) {
          parseRows(rows);
          render();
        }).catch(function (error) {
          nodes.machineState.textContent = "Lỗi";
          nodes.machineState.dataset.tone = "alert";
          toast(error.message || "Không thể tải dữ liệu.", "bad");
        });
      }

      function render() {
        var link = state.link || {};
        var running = state.works.filter(function (work) { return work.status === "đang pha chế"; }).length;
        var waiting = state.works.filter(function (work) { return work.status === "chờ"; }).length;
        nodes.machineName.textContent = safeText(link.machine_name, "Máy pha chế");
        nodes.staffLine.textContent = safeText(link.staff_name, "Khách") + " · " + state.menus.length + " món";
        nodes.machineState.textContent = running ? "Đang pha chế" : "Sẵn sàng";
        nodes.machineState.dataset.tone = running ? "warm" : "ok";
        nodes.queuePill.textContent = waiting ? waiting + " đơn chờ" : "Không chờ";
        nodes.balanceText.textContent = money(link.balance);
        nodes.menuCount.textContent = String(state.menus.length);
        nodes.positionCount.textContent = String(link.position_count || 0);
        renderFilters();
        renderMenus();
        renderWorks();
        renderHistory();
      }

      function catalogs() {
        var seen = { "Tất cả": true };
        var result = ["Tất cả"];
        state.menus.forEach(function (menu) {
          var catalog = safeText(menu.catalog, "Khác");
          if (!seen[catalog]) {
            seen[catalog] = true;
            result.push(catalog);
          }
        });
        return result;
      }

      function renderFilters() {
        var items = catalogs();
        if (items.indexOf(state.catalog) < 0) state.catalog = "Tất cả";
        nodes.filters.innerHTML = items.map(function (item) {
          return '<button class="filter' + (item === state.catalog ? " is-active" : "") + '" type="button" data-catalog="' + esc(item) + '">' + esc(item) + '</button>';
        }).join("");
      }

      function toneFor(menu) {
        var text = (safeText(menu.catalog, "") + " " + menuName(menu)).toLowerCase();
        if (text.indexOf("trà") >= 0) return "tea";
        if (text.indexOf("matcha") >= 0) return "matcha";
        if (text.indexOf("ca cao") >= 0 || text.indexOf("cacao") >= 0) return "cacao";
        return "coffee";
      }

      function menuName(menu) {
        return safeText(menu && (menu.menu_name || menu.name), "Món pha chế");
      }

      function menuMedia(menu, initials) {
        var tone = toneFor(menu);
        var url = safeImageUrl(menu.image_url);
        var fallback = '<div class="drink-mark" data-tone="' + esc(tone) + '">' + esc(initials) + '</div>';
        if (!url) return fallback;
        return '<div class="drink-media"><img src="' + esc(url) + '" alt="" loading="lazy" referrerpolicy="no-referrer" data-image-fallback />' +
          '<div class="drink-mark" data-tone="' + esc(tone) + '" hidden>' + esc(initials) + '</div></div>';
      }

      function renderMenus() {
        var rows = state.menus.filter(function (menu) {
          var matchesCatalog = state.catalog === "Tất cả" || safeText(menu.catalog, "Khác") === state.catalog;
          var haystack = [
            menuName(menu),
            safeText(menu.catalog, ""),
            safeText(menu.ingredient_names, ""),
            safeText(menu.description, "")
          ].join(" ").toLowerCase();
          return matchesCatalog && (!state.search || haystack.indexOf(state.search.toLowerCase()) >= 0);
        });
        nodes.menuList.innerHTML = rows.map(function (menu) {
          var name = menuName(menu);
          var initials = name.slice(0, 2).toUpperCase();
          return '<button class="menu-item" type="button" data-menu-id="' + esc(menu.menu_id) + '">' +
            menuMedia(menu, initials) +
            '<div><div class="item-head"><h2 class="item-title">' + esc(name) + '</h2><span class="price">' + esc(money(menu.price)) + '</span></div>' +
            '<p class="item-meta">' + esc(menu.ingredient_names || menu.description || menu.catalog || "") + '</p></div>' +
          '</button>';
        }).join("") || '<div class="empty">Không có món phù hợp.</div>';
        Array.prototype.forEach.call(nodes.menuList.querySelectorAll("[data-image-fallback]"), function (image) {
          image.addEventListener("error", function () {
            image.hidden = true;
            var fallback = image.parentNode && image.parentNode.querySelector(".drink-mark");
            if (fallback) fallback.hidden = false;
          });
        });
      }

      function renderWorks() {
        nodes.workList.innerHTML = state.works.map(function (work) {
          return '<div class="work-item"><div class="work-row">' +
            '<div class="order-no">' + esc(work.order_no || "-") + '</div>' +
            '<div><h2 class="item-title">' + esc(work.menu_name || "Đơn pha chế") + '</h2><p class="item-meta">' + esc(shortTime(work.created_at)) + '</p></div>' +
            '<span class="pill" data-tone="' + (work.status === "đang pha chế" ? "warm" : "") + '">' + esc(work.status || "chờ") + '</span>' +
          '</div></div>';
        }).join("") || '<div class="empty">Không có đơn đang xử lý.</div>';
      }

      function renderHistory() {
        nodes.historyList.innerHTML = state.history.map(function (item) {
          return '<div class="history-item"><div class="item-head"><div>' +
            '<h2 class="item-title">' + esc(item.menu_name || item.content || "Giao dịch") + '</h2>' +
            '<p class="item-meta">' + esc(shortTime(item.created_at)) + ' · #' + esc(item.order_no || "-") + '</p></div>' +
            '<strong class="price">' + esc(money(item.balance_change)) + '</strong></div></div>';
        }).join("") || '<div class="empty">Chưa có lịch sử.</div>';
      }

      function setTab(name) {
        state.tab = name;
        Array.prototype.forEach.call(document.querySelectorAll("[data-tab]"), function (button) {
          button.setAttribute("aria-selected", button.getAttribute("data-tab") === name ? "true" : "false");
        });
        Array.prototype.forEach.call(document.querySelectorAll("[data-panel]"), function (panel) {
          panel.classList.toggle("is-active", panel.getAttribute("data-panel") === name);
        });
      }

      function findMenu(menuId) {
        return state.menus.filter(function (menu) { return safeText(menu.menu_id, "") === safeText(menuId, ""); })[0] || null;
      }

      function openConfirm(menu) {
        state.selectedMenu = menu;
        nodes.confirmTitle.textContent = menuName(menu);
        nodes.confirmMeta.textContent = safeText(menu.ingredient_names || menu.description, "");
        nodes.confirmPrice.textContent = money(menu.price);
        nodes.sheet.classList.add("is-open");
      }

      function closeConfirm() {
        if (state.loadingOrder) return;
        nodes.sheet.classList.remove("is-open");
      }

      function requestId() {
        return String(Date.now()) + "-" + Math.random().toString(16).slice(2, 10);
      }

      function createOrder() {
        if (!state.selectedMenu || state.loadingOrder) return;
        var now = Date.now();
        if (now - state.lastSubmitAt < 5000) {
          toast("Vui lòng chờ vài giây.", "bad");
          return;
        }
        state.lastSubmitAt = now;
        state.loadingOrder = true;
        nodes.orderButton.disabled = true;
        postPublicMacro("mixer-link-create-order", {
          menu_id: state.selectedMenu.menu_id,
          client_request_id: requestId()
        }).then(function (rows) {
          var row = rows[0] || {};
          if (row.code === "DUPLICATE") {
            closeConfirm();
            toast(row.message || "Đơn đã được ghi nhận.");
            return loadState().then(function () { setTab("stack"); });
          }
          if (row.code !== "OK") {
            throw new Error(row.message || "Không tạo được đơn.");
          }
          closeConfirm();
          if (Number(row.command_required || 0) === 1) {
            return callStartCommand(row).then(function () {
              toast("Đã gửi đơn #" + row.order_no + " đến máy.");
            });
          }
          toast("Đơn #" + row.order_no + " đang chờ.");
          return null;
        }).then(function () {
          return loadState().then(function () { setTab("stack"); });
        }).catch(function (error) {
          toast(error.message || "Không tạo được đơn.", "bad");
          loadState();
        }).finally(function () {
          state.loadingOrder = false;
          nodes.orderButton.disabled = false;
        });
      }

      document.addEventListener("click", function (event) {
        var target = event.target;
        var tab = target && target.closest && target.closest("[data-tab]");
        if (tab) setTab(tab.getAttribute("data-tab"));
        var filter = target && target.closest && target.closest("[data-catalog]");
        if (filter) {
          state.catalog = filter.getAttribute("data-catalog") || "Tất cả";
          renderFilters();
          renderMenus();
        }
        var menuButton = target && target.closest && target.closest("[data-menu-id]");
        if (menuButton) {
          var menu = findMenu(menuButton.getAttribute("data-menu-id"));
          if (menu) openConfirm(menu);
        }
      });
      if (nodes.menuSearch) {
        nodes.menuSearch.addEventListener("input", function () {
          state.search = safeText(nodes.menuSearch.value, "").toLowerCase();
          renderMenus();
        });
      }
      nodes.cancelButton.addEventListener("click", closeConfirm);
      nodes.sheet.addEventListener("click", function (event) {
        if (event.target === nodes.sheet) closeConfirm();
      });
      nodes.orderButton.addEventListener("click", createOrder);
      nodes.refreshButton.addEventListener("click", loadState);

      var refreshTimer = null;
      function startAutoRefresh() {
        window.clearInterval(refreshTimer);
        refreshTimer = null;
        if (!document.hidden) refreshTimer = window.setInterval(loadState, 15000);
      }
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          window.clearInterval(refreshTimer);
          refreshTimer = null;
        } else {
          loadState();
          startAutoRefresh();
        }
      });

      loadState();
      startAutoRefresh();
    })();
  </script>
</body>
</html>
