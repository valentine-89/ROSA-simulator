<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Cabinet - Three Phase</title>
  <link rel="stylesheet" href="/dashboard-themes.css" />
  <script>
    (function () {
      try {
        var savedTheme = window.localStorage.getItem("sample-dashboard-theme");
        if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
      } catch (error) {}
    })();
  </script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--theme-bg);
      color: var(--theme-text);
      font-family: "Segoe UI Variable Text", "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
    }
    body { min-height: 100vh; padding: 18px; }
    .page-shell { width: min(1400px, 100%); margin: 0 auto; display: grid; gap: 18px; }
    .hero,
    .cabinet-card,
    .metric-card,
    .env-card,
    .switch-card {
      background: var(--theme-card);
      border: var(--theme-border);
      box-shadow: var(--theme-shadow);
      border-radius: min(var(--theme-radius), 28px);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 22px;
    }
    .hero h1 { margin: 0; font-size: clamp(1.5rem, 3vw, 2.4rem); letter-spacing: -0.04em; }
    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 800;
      background: color-mix(in srgb, var(--theme-primary) 14%, transparent);
      white-space: nowrap;
    }
    .cabinet-grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr)); }
    .cabinet-card { padding: 18px; display: grid; gap: 18px; min-width: 0; }
    .cabinet-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .cabinet-title { min-width: 0; }
    .cabinet-title h2 { margin: 0; font-size: 1.2rem; letter-spacing: -0.03em; }
    .cabinet-title p { margin: 8px 0 0; color: color-mix(in srgb, var(--theme-text) 68%, transparent); font-size: 0.9rem; line-height: 1.45; word-break: break-word; }
    .cabinet-toolbar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .range-select {
      appearance: none;
      border: var(--theme-border);
      background: var(--theme-btn-bg);
      color: var(--theme-btn-text);
      border-radius: 999px;
      padding: 10px 36px 10px 14px;
      min-width: 122px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: var(--theme-shadow);
      background-image:
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 12px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      cursor: pointer;
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 108px;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      background: color-mix(in srgb, var(--theme-series-4) 16%, transparent);
      color: var(--theme-text);
    }
    .live-pill::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.14);
    }
    .live-pill[data-state="live"]::before { background: #22c55e; box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.16); }
    .live-pill[data-state="error"]::before { background: #ef4444; box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.16); }
    .switch-grid { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .switch-card { padding: 16px; display: grid; gap: 14px; min-width: 0; }
    .switch-head { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .switch-label { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }
    .switch-toggle {
      position: relative;
      min-height: 184px;
      border-radius: 30px;
      border: var(--theme-border);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--theme-card) 76%, black 24%) 0%, color-mix(in srgb, var(--theme-card) 92%, transparent) 100%);
      box-shadow:
        inset 0 22px 28px color-mix(in srgb, black 20%, transparent),
        inset 0 -14px 24px color-mix(in srgb, white 5%, transparent),
        inset 0 0 0 1px color-mix(in srgb, var(--theme-text) 8%, transparent),
        var(--theme-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .switch-toggle::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, color-mix(in srgb, black 20%, transparent) 0%, color-mix(in srgb, black 6%, transparent) 36%, color-mix(in srgb, white 6%, transparent) 100%);
      box-shadow:
        inset 0 16px 18px color-mix(in srgb, black 16%, transparent),
        inset 0 -10px 14px color-mix(in srgb, white 5%, transparent);
      pointer-events: none;
    }
    .switch-toggle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: calc(100% - 54px);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, color-mix(in srgb, black 24%, transparent) 0%, color-mix(in srgb, white 4%, transparent) 100%);
      box-shadow:
        inset 0 14px 18px color-mix(in srgb, black 18%, transparent),
        inset 0 -8px 14px color-mix(in srgb, white 4%, transparent);
      opacity: 0.78;
      pointer-events: none;
    }
    .switch-zone {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 1;
    }
    .switch-zone[data-action="on"] { top: 0; padding-bottom: 88px; }
    .switch-zone[data-action="off"] { bottom: 0; padding-top: 88px; }
    .switch-zone[disabled] { cursor: wait; opacity: 0.54; }
    .switch-lever {
      position: absolute;
      left: 16px;
      right: 16px;
      height: 78px;
      top: 16px;
      border-radius: 24px;
      border: 1px solid color-mix(in srgb, var(--theme-text) 10%, transparent);
      background:
        linear-gradient(180deg, color-mix(in srgb, white 76%, var(--theme-card) 24%) 0%, color-mix(in srgb, var(--theme-card) 90%, transparent) 100%);
      box-shadow:
        0 16px 24px color-mix(in srgb, var(--theme-text) 14%, transparent),
        inset 0 1px 0 color-mix(in srgb, white 52%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 12px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--theme-btn-text);
      transform: translateY(0);
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
      pointer-events: none;
      z-index: 2;
    }
    .switch-lever::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      width: 48px;
      height: calc(100% - 28px);
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, color-mix(in srgb, white 45%, transparent) 0%, color-mix(in srgb, black 12%, transparent) 100%);
      box-shadow: inset 0 1px 0 color-mix(in srgb, white 46%, transparent), inset 0 -2px 6px color-mix(in srgb, black 10%, transparent);
      opacity: 0.62;
    }
    .switch-lever > span {
      position: relative;
      z-index: 1;
    }
    .switch-toggle[data-state="on"] .switch-lever {
      transform: translateY(0);
      background: linear-gradient(180deg, color-mix(in srgb, var(--theme-series-3) 28%, white 72%) 0%, color-mix(in srgb, var(--theme-series-3) 18%, var(--theme-card) 82%) 100%);
      color: color-mix(in srgb, var(--theme-series-3) 78%, #082010);
    }
    .switch-toggle[data-state="off"] .switch-lever {
      transform: translateY(74px);
      background: linear-gradient(180deg, color-mix(in srgb, var(--theme-series-5) 28%, white 72%) 0%, color-mix(in srgb, var(--theme-series-5) 14%, var(--theme-card) 86%) 100%);
      color: color-mix(in srgb, var(--theme-series-5) 78%, #23020d);
    }
    .switch-toggle[data-state="pending"] .switch-lever {
      transform: translateY(37px);
      background: linear-gradient(180deg, color-mix(in srgb, var(--theme-series-4) 30%, white 70%) 0%, color-mix(in srgb, var(--theme-series-4) 14%, var(--theme-card) 86%) 100%);
      color: color-mix(in srgb, var(--theme-series-4) 84%, #291c02);
    }
    .switch-toggle[data-state="offline"] .switch-lever {
      transform: translateY(37px);
      color: color-mix(in srgb, var(--theme-text) 62%, transparent);
    }
    .charts-stack { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr)); align-items: stretch; }
    .charts-stack > * { min-width: 0; }
    .chart-row-secondary { display: contents; }
    .chart-card {
      min-width: 0;
      padding: 16px;
      background: color-mix(in srgb, var(--theme-primary) 4%, var(--theme-card));
      border: var(--theme-border);
      border-radius: min(var(--theme-radius), 24px);
      box-shadow: var(--theme-shadow);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chart-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .chart-head strong { font-size: 1rem; letter-spacing: -0.02em; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 10px 14px; justify-content: flex-end; font-size: 0.8rem; font-weight: 800; }
    .chart-legend-item { display: inline-flex; align-items: center; gap: 8px; color: color-mix(in srgb, var(--theme-text) 74%, transparent); }
    .chart-legend-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--dot-color); flex: 0 0 auto; }
    .chart-live-value { color: var(--theme-text); font-weight: 900; }
    .chart-shell { position: relative; margin-top: auto; flex: 1 1 auto; }
    .chart-svg { display: block; width: 100%; height: 192px; }
    .chart-grid line, .chart-axis line { stroke: color-mix(in srgb, var(--theme-text) 12%, transparent); stroke-width: 1; }
    .chart-y-label { position: absolute; left: 12px; z-index: 1; pointer-events: none; color: color-mix(in srgb, var(--theme-text) 70%, transparent); font-size: 11px; font-weight: 800; line-height: 1; }
    .chart-y-label[data-align="max"] { top: 6px; }
    .chart-y-label[data-align="min"] { bottom: 28px; }
    .chart-path { fill: none; stroke: var(--line-color); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .chart-empty { stroke: color-mix(in srgb, var(--theme-text) 16%, transparent); stroke-width: 2; fill: none; stroke-linecap: round; }
    .chart-hover-line { stroke: color-mix(in srgb, var(--theme-text) 16%, transparent); stroke-width: 1.5; opacity: 0; }
    .chart-hover-point { fill: var(--line-color); stroke: var(--theme-card); stroke-width: 2; opacity: 0; }
    .chart-hitbox { fill: transparent; cursor: crosshair; }
    .chart-tooltip {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 176px;
      padding: 10px 12px;
      border-radius: min(var(--theme-radius), 18px);
      background: color-mix(in srgb, var(--theme-card) 96%, transparent);
      border: var(--theme-border);
      box-shadow: var(--theme-shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(0, 8px, 0);
      transition: opacity 0.14s ease, transform 0.14s ease;
      font-size: 0.8rem;
    }
    .chart-tooltip strong { display: block; margin-bottom: 8px; }
    .chart-tooltip-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 4px; }
    .chart-tooltip-label { display: inline-flex; align-items: center; gap: 8px; }
    .metric-grid { display: contents; }
    .metric-card, .env-card {
      min-width: 0;
      padding: 16px;
      display: grid;
      justify-items: center;
      text-align: center;
      align-content: center;
      height: 100%;
    }
    .metric-card strong, .env-card strong { display: block; font-size: 0.96rem; letter-spacing: -0.02em; text-align: center; }
    .metric-value { margin-top: 12px; font-size: clamp(2.2rem, 4vw, 4rem); font-weight: 900; line-height: 1; letter-spacing: -0.05em; text-align: center; }
    .metric-caption { margin-top: 8px; color: color-mix(in srgb, var(--theme-text) 68%, transparent); font-size: 0.84rem; text-align: center; }
    .motor-shell { position: relative; margin-top: 12px; display: grid; place-items: center; min-height: 186px; }
    .motor-ring {
      --motor-turn: 0deg;
      width: 168px;
      height: 168px;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, var(--theme-card) 0 52%, transparent 53%),
        conic-gradient(from 0deg, var(--theme-series-2) 0deg, var(--theme-series-3) var(--motor-turn), color-mix(in srgb, var(--theme-text) 12%, transparent) var(--motor-turn), color-mix(in srgb, var(--theme-text) 12%, transparent) 360deg);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--theme-text) 8%, transparent);
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .motor-ring[aria-disabled="true"] {
      opacity: 0.6;
      cursor: wait;
      pointer-events: none;
    }
    .motor-inner {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--theme-card) 90%, transparent);
      border: var(--theme-border);
      box-shadow: var(--theme-shadow);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .motor-inner strong { font-size: 1.55rem; font-weight: 900; letter-spacing: -0.05em; }
    .motor-inner span { display: block; margin-top: 4px; font-size: 0.76rem; color: color-mix(in srgb, var(--theme-text) 68%, transparent); }
    .toast-stack {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 70;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(calc(100vw - 28px), 380px);
      pointer-events: none;
    }
    .toast {
      background: var(--theme-card);
      color: var(--theme-text);
      border: var(--theme-border);
      box-shadow: var(--theme-shadow);
      border-radius: min(var(--theme-radius), 18px);
      padding: 12px 14px;
      font-size: 0.9rem;
      font-weight: 800;
    }
    .toast.success { border-bottom: 4px solid #10b981; }
    .toast.error { border-bottom: 4px solid #f43f5e; }
    @media (max-width: 1120px) { .charts-stack { grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr)); } .chart-svg { height: 208px; } }
    @media (max-width: 860px) { .switch-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .hero { align-items: flex-start; flex-direction: column; }
      .switch-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .switch-toggle { min-height: 168px; }
      .switch-zone[data-action="on"] { padding-bottom: 76px; }
      .switch-zone[data-action="off"] { padding-top: 76px; }
      .switch-lever { height: 72px; }
      .switch-toggle[data-state="off"] .switch-lever { transform: translateY(64px); }
      .switch-toggle[data-state="pending"] .switch-lever,
      .switch-toggle[data-state="offline"] .switch-lever { transform: translateY(32px); }
      .chart-head { align-items: flex-start; flex-direction: column; }
      .chart-legend { justify-content: flex-start; }
      .chart-svg { height: 228px; }
      .cabinet-header { flex-direction: column; }
      .cabinet-toolbar { justify-content: flex-start; }
    }
  </style>
</head>

  <script src="/dashboard-command-template.js?v=2026.04.18.1"></script>
  <script>
    (function () {
      var configNode = document.getElementById("smart-cabinet-three-phase-config");
      var dashboardConfig = { syncId: "", sessions: [] };
      try {
        dashboardConfig = JSON.parse(configNode && configNode.textContent ? configNode.textContent : '{"sessions":[]}');
      } catch (error) {
        console.error("Invalid smart cabinet three-phase config", error);
      }

      var searchParams = new URLSearchParams(window.location.search);
      var syncId = String(searchParams.get("syncId") || searchParams.get("syncid") || dashboardConfig.syncId || "").trim();
      var cabinetGrid = document.getElementById("cabinet-grid");
      var cabinetCountChip = document.getElementById("cabinet-count-chip");
      var toastStack = document.getElementById("toast-stack");
      var themePicker = document.getElementById("theme-picker");
      var themePickerToggle = document.getElementById("theme-picker-toggle");
      var themePickerMenu = document.getElementById("theme-picker-menu");
      var historyOptions = [
        { label: "30m", value: 30 * 60 * 1000 },
        { label: "1h", value: 60 * 60 * 1000 },
        { label: "6h", value: 6 * 60 * 60 * 1000 },
        { label: "24h", value: 24 * 60 * 60 * 1000 },
        { label: "7d", value: 7 * 24 * 60 * 60 * 1000 }
      ];
      var globalHistoryWindowMs = historyOptions[2].value;

      function safeText(value, fallback) {
        var normalized = String(value == null ? "" : value).trim();
        return normalized || fallback || "";
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function parseSessionContext(sessionId) {
        var raw = String(sessionId || "").trim();
        var parts = raw.split("@");
        if (parts.length < 2) return null;
        return { ioid: parts[0], apikey: parts.slice(1).join("@") };
      }

      function buildCommandApiUrl(sessionId) {
        var context = parseSessionContext(sessionId);
        if (!context) return "";
        return "https://iot.ioeasy.com/cmd/" + encodeURIComponent(context.ioid) + "?apiKey=" + encodeURIComponent(context.apikey);
      }

      function buildTelemetryUrl(sessionId) {
        if (!sessionId || !syncId) return "";
        return "/api/" + encodeURIComponent(sessionId) + "/" + encodeURIComponent(syncId) + "/iotelemetry";
      }

      function buildStreamUrl(sessionId, fields) {
        var params = new URLSearchParams();
        params.set("historyMs", String(globalHistoryWindowMs));
        params.set("fields", fields.join(","));
        return "/api/" + encodeURIComponent(sessionId) + "/stream?" + params.toString();
      }

      function normalizeSwitchState(value) {
        var normalized = String(value == null ? "" : value).trim().toUpperCase();
        if (normalized === "1" || normalized === "TRUE" || normalized === "ON" || normalized === "CLOSED") return "on";
        if (normalized === "0" || normalized === "FALSE" || normalized === "OFF" || normalized === "OPEN") return "off";
        return "offline";
      }

      function numericValue(value) {
        if (typeof value === "number" && isFinite(value)) return value;
        var match = String(value == null ? "" : value).match(/-?\d+(\.\d+)?/);
        return match ? parseFloat(match[0]) : null;
      }

      function formatValue(value, digits, unit) {
        var numeric = numericValue(value);
        if (numeric === null) return "--";
        return numeric.toFixed(digits) + (unit ? " " + unit : "");
      }

      function formatTime(timestamp) {
        if (!timestamp) return "--";
        try {

      function getSeriesMaxPoints() {

        while (series.length > maxPoints || (series.length > 1 && series[0].ts < cutoff)) {
          series.shift();
        }

          return;
        }
        var left = 46;
        var top = 16;
        var width = 294;
        var height = 182;
        var bottom = top + height;
        var startTs = Date.now() - globalHistoryWindowMs;
        var tsSpan = globalHistoryWindowMs;
        var visibleSeries = chartMeta.series.map(function (entry) {
          return state.series[entry.key]
            .filter(function (point) { return point.ts >= startTs; })
            .slice()
            .sort(function (leftPoint, rightPoint) { return Number(leftPoint.ts || 0) - Number(rightPoint.ts || 0); });
        });
        var allPoints = visibleSeries.reduce(function (result, series) {
          return result.concat(series);
        }, []);

        var gridHtml = "";
        for (var row = 0; row <= 4; row += 1) {
          var y = top + ((height / 4) * row);
          gridHtml += '<line x1="' + left + '" y1="' + y.toFixed(2) + '" x2="' + (left + width) + '" y2="' + y.toFixed(2) + '"></line>';
        }
        chartMeta.grid.innerHTML = gridHtml;

        if (allPoints.length <= 1) {
          chartMeta.empty.setAttribute("d", "M46 106 H340");
          chartMeta.series.forEach(function (entry) {
            entry.path.setAttribute("d", "");
          });
          chartMeta.min.textContent = "0";
          chartMeta.max.textContent = "0";
          chartMeta.bounds = null;
          hideChartTooltip(chartMeta);
          return;
        }

        var values = allPoints.map(function (point) { return point.value; });
        var bounds = resolveChartBounds(values, chartMeta);
        var minValue = bounds.minValue;
        var maxValue = bounds.maxValue;

        function pathFromSeries(series) {
          if (series.length <= 1) return "";
          var path = "";
          series.forEach(function (point, index) {
            var x = left + (((point.ts - startTs) / tsSpan) * width);
            var y = bottom - (((point.value - minValue) / (maxValue - minValue)) * height);
            path += (index === 0 ? "M" : " L") + x.toFixed(2) + " " + y.toFixed(2);
          });
          return path;
        }

        chartMeta.empty.setAttribute("d", "");
        chartMeta.series.forEach(function (entry, index) {
          entry.path.setAttribute("d", pathFromSeries(visibleSeries[index]));
        });
        chartMeta.min.textContent = String(Math.round(minValue));
        chartMeta.max.textContent = String(Math.round(maxValue));
        chartMeta.bounds = {
          left: left,
          top: top,
          width: width,
          height: height,
          bottom: bottom,
          startTs: startTs,
          tsSpan: tsSpan,
          minValue: minValue,
          maxValue: maxValue
        };
      }

      function bindChartHover(state, chartMeta) {
        if (!chartMeta || !chartMeta.hitbox || !chartMeta.tooltip || !Array.isArray(chartMeta.series)) {
          return;
        }
        chartMeta.hitbox.addEventListener("mousemove", function (event) {
          if (!chartMeta.bounds) return;
          var bounds = chartMeta.bounds;
          var rect = chartMeta.hitbox.getBoundingClientRect();
          if (!rect.width || !rect.height) return;
          var relativeX = Math.min(Math.max(event.clientX - rect.left, 0), rect.width);
          var targetTs = bounds.startTs + ((relativeX / rect.width) * bounds.tsSpan);
          var anchor = null;

          chartMeta.series.forEach(function (entry) {
            state.series[entry.key]
              .slice()
              .sort(function (leftPoint, rightPoint) { return Number(leftPoint.ts || 0) - Number(rightPoint.ts || 0); })
              .forEach(function (point) {
              if (point.ts < bounds.startTs) return;
              if (!anchor || Math.abs(point.ts - targetTs) < Math.abs(anchor.ts - targetTs)) anchor = point;
            });
          });
          if (!anchor) return;

          var anchorX = null;
          var tooltipRows = "";
          chartMeta.series.forEach(function (entry) {
            var nearest = null;
            state.series[entry.key]
              .slice()
              .sort(function (leftPoint, rightPoint) { return Number(leftPoint.ts || 0) - Number(rightPoint.ts || 0); })
              .forEach(function (point) {
              if (point.ts < bounds.startTs) return;
              if (!nearest || Math.abs(point.ts - anchor.ts) < Math.abs(nearest.ts - anchor.ts)) nearest = point;
            });
            if (!nearest) {
              entry.point.style.opacity = "0";
              return;
            }
            var pointX = bounds.left + (((nearest.ts - bounds.startTs) / bounds.tsSpan) * bounds.width);
            var pointY = bounds.bottom - (((nearest.value - bounds.minValue) / (bounds.maxValue - bounds.minValue)) * bounds.height);
            if (anchorX === null) anchorX = pointX;
            entry.point.setAttribute("cx", pointX.toFixed(2));
            entry.point.setAttribute("cy", pointY.toFixed(2));
            entry.point.style.opacity = "1";
            tooltipRows += '<div class="chart-tooltip-row"><span class="chart-tooltip-label"><span class="chart-legend-dot" style="--dot-color:' + escapeHtml(entry.color) + ';background:' + escapeHtml(entry.color) + ';"></span>' + escapeHtml(entry.label) + '</span><strong>' + escapeHtml(formatValue(nearest.value, entry.digits, entry.unit)) + '</strong></div>';
          });
          if (anchorX === null) return;
          chartMeta.hoverLine.setAttribute("x1", anchorX.toFixed(2));
          chartMeta.hoverLine.setAttribute("x2", anchorX.toFixed(2));
          chartMeta.hoverLine.style.opacity = "1";
          chartMeta.tooltip.innerHTML = '<strong>' + escapeHtml(formatTime(anchor.ts)) + '</strong>' + tooltipRows;
          chartMeta.tooltip.style.opacity = "1";
          chartMeta.tooltip.style.transform = "translate3d(0, 0, 0)";
          var tooltipLeft = Math.min(Math.max(anchorX + 10, 8), Math.max(8, (chartMeta.shell.clientWidth || 360) - 192));
          chartMeta.tooltip.style.left = tooltipLeft + "px";
          chartMeta.tooltip.style.top = "12px";
        });
        chartMeta.hitbox.addEventListener("mouseleave", function () {
          hideChartTooltip(chartMeta);
        });
      }

      function renderCabinetCharts(state) {
        if (state.voltageChart) renderChart(state, state.voltageChart);
        if (state.currentChart) renderChart(state, state.currentChart);
        if (state.envChart) renderChart(state, state.envChart);
      }

      function updateCabinetField(state, field, value, timestamp, deferRender) {
        var key = String(field || "").trim().toLowerCase();
        var fields = state.fields;
        var eventTs = Number(timestamp || Date.now());
        if (key === String(fields.switch1 || "").trim().toLowerCase()) {
          var switch1State = normalizeSwitchState(value);
          setSwitchVisual(state.switch1State, switch1State, switch1State === "on" ? "ON" : switch1State === "off" ? "OFF" : "OFFLINE");
        } else if (key === String(fields.switch2 || "").trim().toLowerCase()) {
          var switch2State = normalizeSwitchState(value);
          setSwitchVisual(state.switch2State, switch2State, switch2State === "on" ? "ON" : switch2State === "off" ? "OFF" : "OFFLINE");
        } else if (key === String(fields.switch3 || "").trim().toLowerCase()) {
          var switch3State = normalizeSwitchState(value);
          setSwitchVisual(state.switch3State, switch3State, switch3State === "on" ? "ON" : switch3State === "off" ? "OFF" : "OFFLINE");
        } else if (key === String(fields.energy || "").trim().toLowerCase()) {
          if (state.energyValue) state.energyValue.textContent = formatValue(value, 2, "KWh");
        } else if (key === String(fields.powerFactor || "").trim().toLowerCase()) {
          if (state.powerFactorValue) {
            var powerFactor = numericValue(value);
            state.powerFactorValue.textContent = powerFactor === null ? "--" : Math.round(powerFactor) + "%";
          }
        } else if (key === String(fields.temperature || "").trim().toLowerCase()) {
          if (state.temperatureInline) state.temperatureInline.textContent = formatValue(value, 1, "°C");
          var temperature = numericValue(value);
          if (temperature !== null) appendSeriesPoint(state.series.temperature, { ts: eventTs, value: temperature });
        } else if (key === String(fields.humidity || "").trim().toLowerCase()) {
          if (state.humidityInline) state.humidityInline.textContent = formatValue(value, 1, '%');
          var humidity = numericValue(value);
          if (humidity !== null) appendSeriesPoint(state.series.humidity, { ts: eventTs, value: humidity });
        } else if (key === String(fields.motor || "").trim().toLowerCase()) {
          var angle = numericValue(value);
          if (!state.motorValue || !state.motorRing) {
          } else if (angle === null) {
            state.motorValue.textContent = "--";
          } else {
            var normalizedAngle = ((angle % 360) + 360) % 360;
            state.motorValue.textContent = Math.round(normalizedAngle) + "°";
            state.motorRing.style.setProperty("--motor-turn", normalizedAngle + "deg");
          }
        } else if (key === String(fields.voltage1 || "").trim().toLowerCase()) {
          var voltage1 = numericValue(value);
          if (state.voltage1Inline) state.voltage1Inline.textContent = formatValue(value, 1, 'V');
          if (voltage1 !== null) appendSeriesPoint(state.series.voltage1, { ts: eventTs, value: voltage1 });
        } else if (key === String(fields.voltage2 || "").trim().toLowerCase()) {
          var voltage2 = numericValue(value);
          if (state.voltage2Inline) state.voltage2Inline.textContent = formatValue(value, 1, 'V');
          if (voltage2 !== null) appendSeriesPoint(state.series.voltage2, { ts: eventTs, value: voltage2 });
        } else if (key === String(fields.voltage3 || "").trim().toLowerCase()) {
          var voltage3 = numericValue(value);
          if (state.voltage3Inline) state.voltage3Inline.textContent = formatValue(value, 1, 'V');
          if (voltage3 !== null) appendSeriesPoint(state.series.voltage3, { ts: eventTs, value: voltage3 });
        } else if (key === String(fields.current1 || "").trim().toLowerCase()) {
          var current1 = numericValue(value);
          if (state.current1Inline) state.current1Inline.textContent = formatValue(value, 2, 'A');
          if (current1 !== null) appendSeriesPoint(state.series.current1, { ts: eventTs, value: current1 });
        } else if (key === String(fields.current2 || "").trim().toLowerCase()) {
          var current2 = numericValue(value);
          if (state.current2Inline) state.current2Inline.textContent = formatValue(value, 2, 'A');
          if (current2 !== null) appendSeriesPoint(state.series.current2, { ts: eventTs, value: current2 });
        } else if (key === String(fields.current3 || "").trim().toLowerCase()) {
          var current3 = numericValue(value);
          if (state.current3Inline) state.current3Inline.textContent = formatValue(value, 2, 'A');
          if (current3 !== null) appendSeriesPoint(state.series.current3, { ts: eventTs, value: current3 });
        }

        if (!deferRender) renderCabinetCharts(state);
        state.lastUpdatedAt = eventTs;
      }

      function refreshLiveStatus(state) {
        var ageMs = state.lastUpdatedAt > 0 ? (Date.now() - state.lastUpdatedAt) : Infinity;
        if (ageMs < 30000) {
          state.live.setAttribute("data-state", "live");
          state.live.textContent = "Live";
          return;
        }
        if (state.eventSource) {
          state.live.setAttribute("data-state", "connecting");
          state.live.textContent = "Stale";
          return;
        }
        state.live.setAttribute("data-state", "error");
        state.live.textContent = "Offline";
      }

      function handlePayload(state, data) {
        if (!data || !data.type) return;
        if (data.type === "billing_blocked") {
          state.live.setAttribute("data-state", "error");
          state.live.textContent = "Top up needed";
          return;
        }
        if (data.type === "telemetry" && data.payload && typeof data.payload === "object") {
          Object.keys(data.payload).forEach(function (field) {
            updateCabinetField(state, field, data.payload[field], data.serverTime || Date.now(), true);
          });
          renderCabinetCharts(state);
          refreshLiveStatus(state);
        } else if (data.type === "timeseries" && Array.isArray(data.rows)) {
          data.rows.forEach(function (row) {
            updateCabinetField(state, row.field, typeof row.last !== "undefined" ? row.last : row.value, row.ts || Date.now(), true);
          });
          renderCabinetCharts(state);
          refreshLiveStatus(state);
        }
      }

      function sendCommand(state, command, node, pendingLabel) {
        if (!command || !state.commandApiUrl || state.isBusy) return;
        setCabinetBusy(state, true);
        setSwitchVisual(node, "pending", pendingLabel);
        var resolver = window.AIBridgeCommandTemplate;
        var resolvePromise = resolver && typeof resolver.resolveCommandTemplate === "function"
          ? resolver.resolveCommandTemplate(command)
          : Promise.resolve(String(command || "")
            .replace(/<<email>>/gi, "")
            .replace(/<<username>>/gi, ""));
        resolvePromise.then(function (resolvedCommand) {
          return fetch(state.commandApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cmd: String(resolvedCommand || "") })
          });
        }).then(function (response) {
          if (!response.ok) {
            throw new Error("Command failed.");
          }
          showToast("Command sent.", "success");
        }).catch(function () {
          setSwitchVisual(node, "offline", "ERROR");
          showToast("Command failed.", "error");
        }).finally(function () {
          setCabinetBusy(state, false);
        });
      }

      function sendMotorAngle(state, angle) {
        if (!state.commandApiUrl || state.isBusy || !state.motorValue || !state.motorUnit || !state.motorRing) return;
        var normalizedAngle = Math.round(((angle % 360) + 360) % 360);
        setCabinetBusy(state, true);
        state.motorValue.textContent = normalizedAngle + "°";
        state.motorUnit.textContent = "Sending...";
        state.motorRing.style.setProperty("--motor-turn", normalizedAngle + "deg");
        fetch(state.commandApiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd: "D1O2'" + normalizedAngle + "'" })
        }).then(function (response) {
          if (!response.ok) {
            throw new Error("Motor command failed.");
          }
          state.motorUnit.textContent = "Click to set angle";
          showToast("Motor angle sent.", "success");
        }).catch(function () {
          state.motorUnit.textContent = "Command failed";
          showToast("Motor command failed.", "error");
        }).finally(function () {
          setCabinetBusy(state, false);
        });
      }

      function bindMotorDial(state) {
        if (!state.motorRing) return;
        state.motorRing.addEventListener("click", function (event) {
          var rect = state.motorRing.getBoundingClientRect();
          var centerX = rect.left + (rect.width / 2);
          var centerY = rect.top + (rect.height / 2);
          var radians = Math.atan2(event.clientY - centerY, event.clientX - centerX);
          var degrees = ((radians * 180 / Math.PI) + 90 + 360) % 360;
          sendMotorAngle(state, degrees);
        });
      }

      function connectCabinet(state) {
        var streamFields = [
          state.fields.switch1,
          state.fields.switch2,
          state.fields.switch3,
          state.fields.voltage1,
          state.fields.voltage2,
          state.fields.voltage3,
          state.fields.current1,
          state.fields.current2,
          state.fields.current3,
          state.fields.energy,
          state.fields.powerFactor,
          state.fields.motor,
          state.fields.temperature,
          state.fields.humidity
        ].map(function (value) { return String(value || "").trim(); }).filter(Boolean);

        bootstrapCabinet(state).finally(function () {
          state.live.setAttribute("data-state", "connecting");
          state.live.textContent = "Connecting";
          state.eventSource = new EventSource(buildStreamUrl(state.sessionId, streamFields));
          state.eventSource.onmessage = function (event) {
            try { handlePayload(state, JSON.parse(event.data)); } catch (error) {}
          };
          state.eventSource.onerror = function () {
            if (state.eventSource) {
              state.eventSource.close();
              state.eventSource = null;
            }
            state.live.setAttribute("data-state", "connecting");
            state.live.textContent = "Reconnecting";
            if (state.reconnectTimer) window.clearTimeout(state.reconnectTimer);
            state.reconnectTimer = window.setTimeout(function () {
              state.reconnectTimer = null;
              connectCabinet(state);
            }, 3000);
          };
        });
      }

      function bootstrapCabinet(state) {
        var url = buildTelemetryUrl(state.sessionId);
        if (!url) return Promise.resolve();
        return fetch(url, { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) return null;
            return response.json();
          })
          .then(function (payload) {
            var data = payload && payload.c2 && payload.c2.payload;
            if (!data || typeof data !== "object") return;
            Object.keys(data).forEach(function (field) {
              updateCabinetField(state, field, data[field], payload.c2.serverTime || Date.now());
            });
          })
          .catch(function () {});
      }

      var cabinetStates = (Array.isArray(dashboardConfig.sessions) ? dashboardConfig.sessions : []).map(function (sessionConfig, index) {
        return {
          title: safeText(sessionConfig.title, "Cabinet " + String(index + 1)),
          description: safeText(sessionConfig.description, "Three-phase smart cabinet"),
          sessionId: safeText(sessionConfig.sessionId, ""),
          fields: sessionConfig.fields || {},
          commands: sessionConfig.commands || {},
          commandApiUrl: buildCommandApiUrl(sessionConfig.sessionId),
          series: { voltage1: [], voltage2: [], voltage3: [], current1: [], current2: [], current3: [], temperature: [], humidity: [] },
          eventSource: null,
          reconnectTimer: null
        };
      }).filter(function (state) { return state.sessionId; });

      function reconnectCabinet(state) {
        if (state.reconnectTimer) {
          window.clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
        if (state.eventSource) {
          state.eventSource.close();
          state.eventSource = null;
        }
        state.series.voltage1 = [];
        state.series.voltage2 = [];
        state.series.voltage3 = [];
        state.series.current1 = [];
        state.series.current2 = [];
        state.series.current3 = [];
        state.series.temperature = [];
        state.series.humidity = [];
        if (state.voltageChart) renderChart(state, state.voltageChart);
        if (state.currentChart) renderChart(state, state.currentChart);
        if (state.envChart) renderChart(state, state.envChart);
        connectCabinet(state);
      }

      function applyGlobalHistoryWindow(nextValue) {
        globalHistoryWindowMs = nextValue;
        cabinetStates.forEach(function (state) {
          if (state.rangeSelect && Number(state.rangeSelect.value) !== nextValue) {
            state.rangeSelect.value = String(nextValue);
          }
          reconnectCabinet(state);
        });
      }

      cabinetStates.forEach(function (state) {
        renderCabinet(state);
        Object.keys(state.switchControls).forEach(function (switchKey) {
          var control = state.switchControls[switchKey];
          if (control.onButton) {
            control.onButton.addEventListener("click", function () {
              sendCommand(state, control.onCommand, control.stateNode, "Turning on");
            });
          }
          if (control.offButton) {
            control.offButton.addEventListener("click", function () {
              sendCommand(state, control.offCommand, control.stateNode, "Turning off");
            });
          }
        });
        state.rangeSelect.addEventListener("change", function () {
          applyGlobalHistoryWindow(Number(state.rangeSelect.value || historyOptions[2].value));
        });
        bindMotorDial(state);
        if (state.voltageChart) renderChart(state, state.voltageChart);
        if (state.currentChart) renderChart(state, state.currentChart);
        if (state.envChart) renderChart(state, state.envChart);
        connectCabinet(state);
      });

      cabinetCountChip.textContent = cabinetStates.length + " cabinet" + (cabinetStates.length === 1 ? "" : "s");
      window.setInterval(function () {
        cabinetStates.forEach(refreshLiveStatus);
      }, 5000);
      document.addEventListener("click", function (event) {
        var themeOption = event.target && typeof event.target.closest === "function"
          ? event.target.closest("[data-theme-option]")
          : null;
        if (themeOption) {
          setTheme(String(themeOption.getAttribute("data-theme-option") || "neumorphism"));
          closeThemePickerMenu();
          return;
        }

        var themeToggle = event.target && typeof event.target.closest === "function"
          ? event.target.closest("#theme-picker-toggle")
          : null;
        if (themeToggle) {
          if (themePickerMenu.classList.contains("is-open")) {
            closeThemePickerMenu();
          } else {
            openThemePickerMenu();
          }
          return;
        }

        if (!themePickerMenu.contains(event.target)) {
          closeThemePickerMenu();
        }
      });
      setTheme(document.documentElement.getAttribute("data-theme") || "neumorphism");
    })();
  </script>
  <!-- AI-BRIDGE-LOCKED RUNTIME SCRIPT: END -->
</body>
